<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorpresa Equipo</title>
    <style>
        :root {
            --phone-bg: #0b0d17;
            --accent: #00d2ff;
            --button-pink: #ff0055;
            --button-green: #25d366;
            --gold: #ffde59;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }

        .phone-frame {
            width: 330px;
            height: 650px;
            background: #000;
            border: 12px solid #333;
            border-radius: 45px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .notch {
            width: 150px; height: 25px; background: #333;
            position: absolute; top: 0; left: 50%;
            transform: translateX(-50%); border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px; z-index: 20;
        }

        .screen {
            width: 100%; height: 100%;
            background: var(--phone-bg);
            position: relative;
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .stars-container {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; pointer-events: none; z-index: 2;
        }
        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle var(--d) infinite;
        }

        @keyframes twinkle { 
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .btn {
            background: var(--button-pink);
            color: white; border: none; padding: 18px 25px;
            font-size: 1.1rem; font-weight: bold; border-radius: 50px;
            cursor: pointer; box-shadow: 0 5px 15px rgba(255, 0, 85, 0.4);
            z-index: 100; position: relative;
            text-transform: uppercase;
            width: 100%;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-whatsapp {
            background: var(--button-green);
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
            font-size: 1rem;
        }

        .page { 
            display: none; width: 100%; height: 100%; 
            flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; 
            z-index: 5;
        }
        .active { display: flex; }

        .typewriter {
            font-size: 1.05rem; line-height: 1.6; text-align: left;
            margin: 0 auto; color: #fff;
            min-height: 200px;
        }

        .cumple-list { width: 100%; margin-top: 5px; }
        .cumple-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px; margin: 5px 0;
            border-radius: 12px; text-align: left; font-size: 0.8rem;
            border-left: 4px solid var(--accent);
        }
        .cumple-status { display: block; font-size: 0.7rem; color: #aaa; margin-top: 2px; }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="notch"></div>
        <div class="screen">
            <div class="stars-container" id="stars"></div>

            <div id="page1" class="page active">
                <h1 style="color: var(--accent); margin-bottom: 30px;">¡SORPRESA!</h1>
                <button class="btn" onclick="goToPage2()">¡APLASTAME!</button>
            </div>

            <div id="page2" class="page">
                <div id="typewriter-text" class="typewriter"></div>
                <button id="btn-next" class="btn" style="display:none; margin-top: 20px;" onclick="goToPage3()">¡APLASTAME!</button>
            </div>

            <div id="page3" class="page">
                <h3 style="color: var(--gold); margin-bottom: 8px; font-size: 1rem;">¿Y qué tal si tenemos al tanto los cumpleaños?</h3>
                <div class="cumple-list">
                    <div class="cumple-item"><strong>16 Marzo - Sarita</strong><span class="cumple-status">Ya pasó... Esperemos al próximo año 😢</span></div>
                    <div class="cumple-item"><strong>24 Mayo - Yadira</strong><span class="cumple-status">¡Todavía falta! Celebremos 😊</span></div>
                    <div class="cumple-item" style="border-left-color: var(--gold);"><strong>9 Noviembre - Nelvin</strong><span class="cumple-status">Creo que falta... 👨‍💻</span></div>
                    <div class="cumple-item"><strong>26 Septiembre - Jose</strong><span class="cumple-status">Falta por llegar... ⏳</span></div>
                    <div class="cumple-item"><strong>15 Octubre - Marly</strong><span class="cumple-status">También falta... 🗓️</span></div>
                </div>
                
                <a href="https://chat.whatsapp.com/CW1YR6MPP737hc4mg2zjav" class="btn btn-whatsapp">IR AL WHATSAPP 📱</a>
            </div>
        </div>
    </div>

    <audio id="musica" preload="auto"><source src="musica.mp3" type="audio/mpeg"></audio>

    <script>
        // Estrellas
        const sc = document.getElementById('stars');
        for (let i = 0; i < 40; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const sz = Math.random() * 3 + 'px';
            s.style.width = sz; s.style.height = sz;
            s.style.top = Math.random() * 100 + '%';
            s.style.left = Math.random() * 100 + '%';
            s.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
            sc.appendChild(s);
        }

        const msg = "¡Este ciclo seamos el mejor equipo! Con todos los ánimos, compartamos experiencias, fotos, grabar tiktoks, risas, seriedad jajaj. Al final como sabemos, no sabemos que podría ocurrir con alguno de nosotros el día de mañana, así que aprovechemos al máximo.";
        let idx = 0;

        function goToPage2() {
            const a = document.getElementById('musica');
            a.play().catch(e => console.log("Audio activo"));
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
            type();
        }

        function type() {
            if (idx < msg.length) {
                document.getElementById("typewriter-text").innerHTML += msg.charAt(idx);
                idx++;
                setTimeout(type, 35);
            } else {
                document.getElementById("btn-next").style.display = "block";
            }
        }

        function goToPage3() {
            document.getElementById('page2').classList.remove('active');
            document.getElementById('page3').classList.add('active');
        }
    </script>
</body>
</html>
